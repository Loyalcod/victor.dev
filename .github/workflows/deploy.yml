name: Deploy Laravel Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 148.230.122.109 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 citi360@148.230.122.109 << 'EOF'
            set -e

            PROJECT_PATH="/home/citi360/victor.dev"
            PUBLIC_HTML="/home/citi360/web/victor.citizensnewscn.com/public_html"

            if [ ! -d "$PROJECT_PATH/.git" ]; then
              git clone git@github.com:${{ github.repository }}.git "$PROJECT_PATH"
            fi

            cd "$PROJECT_PATH"

            git fetch origin main
            git reset --hard origin/main

            composer install --no-dev --optimize-autoloader --no-interaction

            if [ -f package.json ]; then
              npm install
              npm run build
            fi

            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            php artisan key:generate --force
            php artisan storage:link || true

            rm -f bootstrap/cache/*.php
            rm -rf storage/framework/cache/data/*
            rm -rf storage/framework/sessions/*
            rm -rf storage/framework/views/*

            php artisan config:clear
            php artisan route:clear
            php artisan view:clear

            rm -rf "$PUBLIC_HTML"/*
            rsync -av "$PROJECT_PATH/public/" "$PUBLIC_HTML/"

            sed -i "s|__DIR__.'/../vendor/autoload.php'|__DIR__.'/../../../victor.dev/vendor/autoload.php'|g" "$PUBLIC_HTML/index.php"
            sed -i "s|__DIR__.'/../bootstrap/app.php'|__DIR__.'/../../../victor.dev/bootstrap/app.php'|g" "$PUBLIC_HTML/index.php"
          EOF