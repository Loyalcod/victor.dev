name: Deploy Laravel Project

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf "%s" "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 148.230.122.109 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 citi360@148.230.122.109 << 'EOF'
            set -e

            cd ${{ secrets.PROJECT_PATH }}

            git pull origin main

            composer install --no-dev --optimize-autoloader --no-interaction

            if [ ! -f vendor/autoload.php ]; then
              echo "Composer vendor folder was not created. Deployment stopped."
              exit 1
            fi

            if [ -f package.json ]; then
              npm install
              npm run build
            fi

            if [ ! -f .env ]; then
              cp .env.example .env
            fi

            php artisan key:generate --force
            php artisan migrate --force
            php artisan storage:link || true

            php artisan config:clear
            php artisan cache:clear
            php artisan route:clear
            php artisan view:clear

            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
          EOF