name: Deploy App to Vps

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH & Deploy to VPS
    runs-on: ubuntu-latest  

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "→ Deploying to production"
            cd ${{ secrets.PROJECT_PATH }}
            git fetch origin main
            git reset --hard origin/main

            echo "→ Checking if composer install is needed..."
            CHANGED=$(git diff --name-only HEAD~1 HEAD | grep -E 'composer\.json|composer\.lock' || true)
            if [ ! -z "$CHANGED" ]; then
              echo "✔️ Detected changes in composer files. Installing dependencies..."
              composer install --no-interaction --prefer-dist --optimize-autoloader
            else
              echo "✔️ No changes in composer files. Skipping composer install."
            fi

            echo "→ Running Laravel optimization commands..."
            php artisan optimize:clear
            php artisan optimize

            # echo "→ Checking for changes in database folder..."
            # if git diff --name-only HEAD^ HEAD | grep -q "^database/"; then
            #   echo "✔️ Detected changes in database folder. Running migrations..."
            #   php artisan migrate --force --seed
            # else
            #   echo "✔️ No changes in database folder. Skipping migration."
            # fi

            echo "→ Checking if permission setup already done..."
            if [ ! -f storage/permissions.lock ]; then
              echo "Setting permissions..."
              chmod -R ug+rwx storage bootstrap/cache
              touch storage/permissions.lock
              echo "✔️ Permissions set and lock created."
            else
              echo "✔️ Permissions already set. Skipping."
            fi